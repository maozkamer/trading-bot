app = "trading-bot-d-pngg"
primary_region = "iad"

[build]

[processes]
app = "python bot.py"

[env]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
