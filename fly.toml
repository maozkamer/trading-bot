# fly.toml app configuration file generated for trading-bot-d-pngg on 2026-07-12T08:10:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trading-bot-d-pngg'
primary_region = 'lhr'

[build]

[processes]
  app = 'python bot.py'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
