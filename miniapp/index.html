<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trading Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --accent: #1f6feb;
    --radius: 10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 14px;
  }

  /* ── NAV ── */
  .nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    padding: 12px 4px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-btn .icon { font-size: 18px; }
  .nav-btn.active { color: var(--blue); border-bottom: 2px solid var(--blue); }

  /* ── PAGES ── */
  .page { display: none; padding: 12px; }
  .page.active { display: block; }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
  }

  .card-title {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── WATCHLIST ── */
  .stock-row {
    display: flex;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 6px;
    padding: 10px 8px;
  }

  .stock-row:last-child { border-bottom: none; }
  .stock-row:active { background: var(--surface2); }

  .stock-symbol {
    font-weight: 700;
    font-size: 15px;
    min-width: 75px;
    color: var(--text);
  }

  .stock-price {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
  }

  .stock-change {
    min-width: 68px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 5px;
  }

  .stock-rsi {
    min-width: 60px;
    text-align: left;
    font-size: 12px;
    color: var(--text-muted);
    padding-right: 4px;
  }

  .up { color: var(--green); background: rgba(63,185,80,0.12); }
  .down { color: var(--red); background: rgba(248,81,73,0.12); }
  .neutral { color: var(--text-muted); background: var(--surface2); }

  /* ── RSI BADGE ── */
  .rsi-badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .rsi-hot { background: rgba(248,81,73,0.2); color: var(--red); }
  .rsi-cold { background: rgba(63,185,80,0.2); color: var(--green); }
  .rsi-norm { color: var(--text-muted); }

  /* ── SCREENER ── */
  .section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin: 14px 0 8px;
  }

  .screener-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .screener-item:active { opacity: 0.7; }
  .screener-sym { font-weight: 700; font-size: 14px; }
  .screener-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .screener-badge {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-green { background: rgba(63,185,80,0.18); color: var(--green); }
  .badge-red   { background: rgba(248,81,73,0.18); color: var(--red); }
  .badge-yellow{ background: rgba(210,153,34,0.18); color: var(--yellow); }
  .badge-blue  { background: rgba(88,166,255,0.18); color: var(--blue); }

  /* ── ANALYSIS ── */
  .symbol-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .symbol-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 15px;
    text-transform: uppercase;
    outline: none;
    direction: ltr;
  }

  .symbol-input:focus { border-color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-primary:active { opacity: 0.8; }

  .indicators-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .indicator-card {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
  }

  .indicator-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .indicator-value {
    font-size: 16px;
    font-weight: 700;
  }

  .indicator-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .levels-row {
    display: flex;
    gap: 8px;
  }

  .level-block {
    flex: 1;
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .level-block-title {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 600;
  }

  .level-item {
    font-size: 13px;
    padding: 3px 0;
    font-weight: 600;
  }

  .chart-container {
    position: relative;
    height: 220px;
    margin-bottom: 10px;
  }

  /* ── FEAR & GREED ── */
  .fg-gauge-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
  }

  .fg-gauge {
    position: relative;
    width: 240px;
    height: 130px;
    margin-bottom: 16px;
  }

  .fg-label {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 4px;
    text-align: center;
  }

  .fg-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
    text-align: center;
  }

  .fg-prev {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 20px;
  }

  .fg-scale {
    display: flex;
    width: 100%;
    max-width: 320px;
    gap: 4px;
    margin: 0 auto;
  }

  .fg-scale-item {
    flex: 1;
    text-align: center;
    font-size: 10px;
    padding: 5px 2px;
    border-radius: 5px;
    font-weight: 600;
  }

  .fg-extreme-fear { background: rgba(248,81,73,0.25); color: var(--red); }
  .fg-fear         { background: rgba(210,153,34,0.2); color: var(--yellow); }
  .fg-neutral      { background: rgba(139,148,158,0.2); color: var(--text-muted); }
  .fg-greed        { background: rgba(63,185,80,0.18); color: var(--green); }
  .fg-extreme-greed{ background: rgba(63,185,80,0.3); color: #4ae168; }

  /* ── LOADING / ERROR ── */
  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    text-align: center;
    padding: 30px 20px;
    color: var(--red);
    font-size: 13px;
  }

  .empty-msg {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ── HEADER BAR ── */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .page-header-title {
    font-size: 18px;
    font-weight: 700;
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: color 0.2s;
  }

  .refresh-btn:active { color: var(--blue); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 20px 16px 32px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    direction: ltr;
    text-align: center;
  }

  .modal-close {
    float: left;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }

  /* ── QUICK CHIPS ── */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 12px;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.15s;
  }

  .chip:active, .chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── MACD bar colors ── */
  .macd-pos { color: var(--green); }
  .macd-neg { color: var(--red); }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('watchlist', this)">
    <span class="icon">📋</span>
    <span>Watchlist</span>
  </button>
  <button class="nav-btn" onclick="showPage('screener', this)">
    <span class="icon">🔍</span>
    <span>סקרינר</span>
  </button>
  <button class="nav-btn" onclick="showPage('analysis', this)">
    <span class="icon">📊</span>
    <span>ניתוח</span>
  </button>
  <button class="nav-btn" onclick="showPage('feargreed', this)">
    <span class="icon">😱</span>
    <span>Fear&Greed</span>
  </button>
</nav>

<!-- ═══════════════════════════════════════════
     PAGE 1: WATCHLIST
═══════════════════════════════════════════ -->
<div id="page-watchlist" class="page active">
  <div class="page-header">
    <span class="page-header-title">📋 Watchlist</span>
    <button class="refresh-btn" onclick="loadWatchlist()">⟳ רענן</button>
  </div>
  <div id="watchlist-content">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div>טוען נתונים…</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     PAGE 2: SCREENER
═══════════════════════════════════════════ -->
<div id="page-screener" class="page">
  <div class="page-header">
    <span class="page-header-title">🔍 סקרינר</span>
    <button class="refresh-btn" onclick="loadScreener()">⟳ רענן</button>
  </div>
  <div id="screener-content">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div>מריץ סקרינר…</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     PAGE 3: ANALYSIS
═══════════════════════════════════════════ -->
<div id="page-analysis" class="page">
  <div class="symbol-input-row">
    <input id="analysis-input" class="symbol-input" type="text" placeholder="הכנס סימבול (AAPL)" maxlength="12"
      onkeydown="if(event.key==='Enter') loadAnalysis()" />
    <button class="btn-primary" onclick="loadAnalysis()">נתח</button>
  </div>

  <!-- quick chips -->
  <div class="chips" id="quick-chips"></div>

  <div id="analysis-content">
    <div class="empty-msg">בחר מנייה לניתוח</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     PAGE 4: FEAR & GREED
═══════════════════════════════════════════ -->
<div id="page-feargreed" class="page">
  <div class="page-header">
    <span class="page-header-title">😱 Fear &amp; Greed Index</span>
    <button class="refresh-btn" onclick="loadFearGreed()">⟳ רענן</button>
  </div>
  <div id="fg-content">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div>טוען…</div>
    </div>
  </div>
</div>

<!-- ANALYSIS MODAL (from watchlist tap) -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-body">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// TELEGRAM INIT
// ══════════════════════════════════════════════
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  document.documentElement.style.setProperty('--tg-bg', tg.colorScheme === 'dark' ? '#0d1117' : '#fff');
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
const pageLoaded = {};

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');

  if (!pageLoaded[name]) {
    pageLoaded[name] = true;
    if (name === 'watchlist') loadWatchlist();
    if (name === 'screener') loadScreener();
    if (name === 'feargreed') loadFearGreed();
    if (name === 'analysis') buildQuickChips();
  }
}

// ══════════════════════════════════════════════
// API HELPERS
// ══════════════════════════════════════════════
const BASE = '';

async function apiFetch(path) {
  const res = await fetch(BASE + path);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function fmt(n, dec = 2) {
  if (n == null) return '—';
  return Number(n).toFixed(dec);
}

function truncSentences(text, max) {
  if (!text) return '';
  max = max || 2;
  let count = 0, i = 0;
  while (i < text.length && count < max) {
    if (text[i] === '.') count++;
    i++;
  }
  return text.slice(0, i).trim();
}

function changeClass(v) {
  if (v > 0) return 'up';
  if (v < 0) return 'down';
  return 'neutral';
}

function rsiClass(v) {
  if (v == null) return 'rsi-norm';
  if (v > 70) return 'rsi-hot';
  if (v < 30) return 'rsi-cold';
  return 'rsi-norm';
}

function rsiLabel(v) {
  if (v == null) return '—';
  if (v > 70) return `<span class="rsi-badge rsi-hot">RSI ${fmt(v,0)}</span>`;
  if (v < 30) return `<span class="rsi-badge rsi-cold">RSI ${fmt(v,0)}</span>`;
  return `<span class="rsi-badge rsi-norm">RSI ${fmt(v,0)}</span>`;
}

// ══════════════════════════════════════════════
// PAGE 1 — WATCHLIST
// ══════════════════════════════════════════════
async function loadWatchlist() {
  const el = document.getElementById('watchlist-content');
  el.innerHTML = `<div class="loading"><div class="loading-spinner"></div><div>טוען נתונים…</div></div>`;
  try {
    const data = await apiFetch('/api/watchlist');
    const symbols = data.symbols || [];

    if (!symbols.length) {
      el.innerHTML = `<div class="empty-msg">אין מניות ב-Watchlist</div>`;
      return;
    }

    el.innerHTML = `<div class="card">` +
      symbols.map(s => {
        const chg = s.change ?? 0;
        const cls = changeClass(chg);
        const sign = chg >= 0 ? '+' : '';
        return `<div class="stock-row" onclick="openAnalysisModal('${s.symbol}')">
          <div class="stock-symbol">${s.symbol}</div>
          <div class="stock-price">$${fmt(s.price)}</div>
          <div class="stock-rsi">${rsiLabel(s.rsi)}</div>
          <div class="stock-change ${cls}">${sign}${fmt(chg,1)}%</div>
        </div>`;
      }).join('') +
    `</div>`;
  } catch (e) {
    el.innerHTML = `<div class="error-msg">⚠️ שגיאה בטעינה<br><small>${e.message}</small></div>`;
  }
}

// ══════════════════════════════════════════════
// PAGE 2 — SCREENER
// ══════════════════════════════════════════════
async function loadScreener() {
  const el = document.getElementById('screener-content');
  el.innerHTML = `<div class="loading"><div class="loading-spinner"></div><div>מריץ סקרינר…</div></div>`;
  try {
    const data = await apiFetch('/api/screener');

    let html = '';

    html += renderScreenerSection('🚀 פריצות (Breakouts)', data.breakouts || [], s =>
      `<div>${s.symbol}</div><div class="screener-detail">+${fmt(s.change,1)}% | נפח x${fmt(s.vol_ratio,1)}</div>`,
      'badge-green', v => `+${fmt(v.change,1)}%`
    );

    html += renderScreenerSection('📊 נפח חריג', data.volume || [], s =>
      `<div>${s.symbol}</div><div class="screener-detail">$${fmt(s.price)} | נפח x${fmt(s.vol_ratio,1)}</div>`,
      'badge-blue', v => `x${fmt(v.vol_ratio,1)}`
    );

    html += renderScreenerSection('🔥 Oversold (RSI < 35)', data.oversold || [], s =>
      `<div>${s.symbol}</div><div class="screener-detail">$${fmt(s.price)} | ${fmt(s.change,1)}%</div>`,
      'badge-green', v => `RSI ${fmt(v.rsi,0)}`
    );

    html += renderScreenerSection('⚠️ Overbought (RSI > 70)', data.overbought || [], s =>
      `<div>${s.symbol}</div><div class="screener-detail">$${fmt(s.price)} | ${fmt(s.change,1)}%</div>`,
      'badge-red', v => `RSI ${fmt(v.rsi,0)}`
    );

    el.innerHTML = html || `<div class="empty-msg">אין תוצאות כרגע</div>`;
  } catch (e) {
    el.innerHTML = `<div class="error-msg">⚠️ שגיאה<br><small>${e.message}</small></div>`;
  }
}

function renderScreenerSection(title, items, rowFn, badgeClass, badgeFn) {
  if (!items.length) return '';
  return `
    <div class="section-title">${title}</div>
    ${items.map(s => `
      <div class="screener-item" onclick="openAnalysisModal('${s.symbol}')">
        <div class="screener-sym">${rowFn(s)}</div>
        <div class="screener-badge ${badgeClass}">${badgeFn(s)}</div>
      </div>
    `).join('')}
  `;
}

// ══════════════════════════════════════════════
// PAGE 3 — ANALYSIS
// ══════════════════════════════════════════════
let candleChart = null;
let currentWatchlistSymbols = [];

function buildQuickChips() {
  // Will be populated after watchlist loads
  const saved = JSON.parse(localStorage.getItem('recentSymbols') || '[]');
  const defaults = ['AAPL','NVDA','TSLA','PLTR','NNE','META','MARA','COIN'];
  const chips = [...new Set([...saved, ...defaults])].slice(0, 12);
  document.getElementById('quick-chips').innerHTML = chips.map(s =>
    `<span class="chip" onclick="selectChip('${s}')">${s}</span>`
  ).join('');
}

function selectChip(sym) {
  document.getElementById('analysis-input').value = sym;
  loadAnalysis();
}

async function loadAnalysis() {
  const sym = document.getElementById('analysis-input').value.trim().toUpperCase();
  if (!sym) return;

  // Save to recent
  const recent = JSON.parse(localStorage.getItem('recentSymbols') || '[]');
  const updated = [sym, ...recent.filter(s => s !== sym)].slice(0, 6);
  localStorage.setItem('recentSymbols', JSON.stringify(updated));
  buildQuickChips();

  const el = document.getElementById('analysis-content');
  el.innerHTML = `<div class="loading"><div class="loading-spinner"></div><div>מנתח ${sym}…</div></div>`;

  try {

function drawCandleChart(candles, supports, resistances) {
  if (candleChart) { candleChart.destroy(); candleChart = null; }

  const ctx = document.getElementById('candle-chart')?.getContext('2d');
  if (!ctx) return;

  const labels = candles.map(c => c.date);
  const closes = candles.map(c => c.close);
  const opens  = candles.map(c => c.open);
  const highs  = candles.map(c => c.high);
  const lows   = candles.map(c => c.low);

  // Simple line chart with gradient since financial plugin may not load
  const gradient = ctx.createLinearGradient(0, 0, 0, 200);
  gradient.addColorStop(0, 'rgba(88,166,255,0.3)');
  gradient.addColorStop(1, 'rgba(88,166,255,0.02)');

  const barColors = candles.map(c => c.close >= c.open ? 'rgba(63,185,80,0.85)' : 'rgba(248,81,73,0.85)');

  candleChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Close',
          data: closes,
          backgroundColor: barColors,
          borderColor: barColors,
          borderWidth: 1,
          borderRadius: 2,
          categoryPercentage: 0.7,
          barPercentage: 0.85,
        },
        {
          label: 'High/Low',
          data: candles.map(c => ({ x: c.date, y: [c.low, c.high] })),
          type: 'bar',
          backgroundColor: barColors.map(c => c.replace('0.85', '0.4')),
          categoryPercentage: 0.25,
          barPercentage: 1,
          hidden: false,
        }
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161b22',
          borderColor: '#30363d',
          borderWidth: 1,
          titleColor: '#e6edf3',
          bodyColor: '#8b949e',
          callbacks: {
            label: (ctx) => `$${ctx.parsed.y?.toFixed ? ctx.parsed.y.toFixed(2) : '—'}`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(48,54,61,0.5)', drawBorder: false },
          ticks: { color: '#8b949e', font: { size: 10 }, maxTicksLimit: 6, maxRotation: 0 }
        },
        y: {
          position: 'left',
          grid: { color: 'rgba(48,54,61,0.5)', drawBorder: false },
          ticks: { color: '#8b949e', font: { size: 10 }, callback: v => '$' + v.toFixed(0) }
        }

    }
  });
}

let fgChart = null;

async function loadFearGreed() {
  const el = document.getElementById('fg-content');
  el.innerHTML = `<div class="loading"><div class="loading-spinner"></div><div>טוען…</div></div>`;
  try {
    const data = await apiFetch('/api/fear_greed');
    renderFearGreed(el, data);
  } catch (e) {
    el.innerHTML = `<div class="error-msg">⚠️ שגיאה<br><small>${e.message}</small></div>`;
  }
}

function getFGColor(val) {
  if (val <= 25) return '#f85149';
  if (val <= 45) return '#d29922';
  if (val <= 55) return '#8b949e';
  if (val <= 75) return '#3fb950';
  return '#4ae168';
}

function getFGName(val) {
  if (val <= 25) return 'פחד קיצוני';
  if (val <= 45) return 'פחד';
  if (val <= 55) return 'נייטרלי';
  if (val <= 75) return 'חמדנות';
  return 'חמדנות קיצונית';
}

function renderFearGreed(el, data) {
  const val = data.value ?? data.score ?? 0;
  const prev = data.previous_close ?? data.yesterday ?? null;
  const week = data.last_week ?? null;
  const month = data.last_month ?? null;
  const color = getFGColor(val);
  const name  = getFGName(val);

  el.innerHTML = `
    <div class="card">
      <div class="fg-gauge-wrap">
        <canvas id="fg-gauge" width="240" height="130"></canvas>
        <div class="fg-label" style="color:${color}">${val}</div>
        <div class="fg-name" style="color:${color}">${name}</div>
        ${prev != null ? `<div class="fg-prev">אתמול: ${prev} | לפני שבוע: ${week ?? '—'}</div>` : ''}
      </div>

      <div class="fg-scale">
        <div class="fg-scale-item fg-extreme-fear">פחד קיצוני<br>0–25</div>
        <div class="fg-scale-item fg-fear">פחד<br>26–45</div>
        <div class="fg-scale-item fg-neutral">נייטרלי<br>46–55</div>
        <div class="fg-scale-item fg-greed">חמדנות<br>56–75</div>
        <div class="fg-scale-item fg-extreme-greed">חמדנות קיצונית<br>76–100</div>
      </div>
    </div>

    ${(data.components || data.indicators) ? renderFGComponents(data) : ''}

    <div class="card" style="margin-top:10px">
      <div class="card-title">פרשנות</div>
      <div style="font-size:13px;line-height:1.6;color:var(--text-muted)">
        ${val <= 25
          ? '😱 שוק בפחד קיצוני. היסטורית, זה עשוי להיות הזמן לקנות — "Be greedy when others are fearful."'
          : val <= 45
          ? '😰 השוק בפחד. מומלץ לשמור על משמעת וכניסות מדורגות.'
          : val <= 55
          ? '😐 שוק נייטרלי. אין עדיפות ברורה לכיוון.'
          : val <= 75
          ? '😏 שוק חמדני. כדאי להיות זהיר יותר עם כניסות חדשות.'
          : '🤑 חמדנות קיצונית. שוק עשוי להיות מוגזם — "Be fearful when others are greedy."'
        }
      </div>
    </div>
  `;

  drawGauge(val, color);
}

function renderFGComponents(data) {
  const comps = data.components || data.indicators || {};
  if (!Object.keys(comps).length) return '';
  return `
    <div class="card" style="margin-top:10px">
      <div class="card-title">רכיבים</div>
      ${Object.entries(comps).map(([k, v]) => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:13px">${k}</span>
          <span style="font-size:13px;font-weight:600;color:${getFGColor(typeof v === 'object' ? v.value ?? 50 : v)}">${typeof v === 'object' ? v.value_classification ?? v.value : v}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function drawGauge(val, color) {
  const canvas = document.getElementById('fg-gauge');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 120, cy = 120, r = 90;

  ctx.clearRect(0, 0, 240, 130);

  // Background arc
  const sections = [
    { from: 0, to: 25,  color: '#f85149' },
    { from: 25, to: 45, color: '#d29922' },
    { from: 45, to: 55, color: '#8b949e' },
    { from: 55, to: 75, color: '#3fb950' },
    { from: 75, to: 100,color: '#4ae168' },
  ];

  for (const s of sections) {
    const startAngle = Math.PI + (s.from / 100) * Math.PI;
    const endAngle   = Math.PI + (s.to   / 100) * Math.PI;
    ctx.beginPath();
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.lineWidth = 16;
    ctx.strokeStyle = s.color + '55';
    ctx.stroke();
  }

  // Fill up to value
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, Math.PI + (val / 100) * Math.PI);
  ctx.lineWidth = 16;
  ctx.strokeStyle = color;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Needle
  const angle = Math.PI + (val / 100) * Math.PI;
  const nx = cx + (r - 20) * Math.cos(angle);
  const ny = cy + (r - 20) * Math.sin(angle);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(nx, ny);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Labels
  ctx.font = 'bold 11px -apple-system, sans-serif';
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'center';
  ctx.fillText('0', cx - r - 2, cy + 16);
  ctx.fillText('100', cx + r + 2, cy + 16);
  ctx.fillText('50', cx, cy - r - 6);
}
